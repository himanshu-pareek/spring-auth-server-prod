<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/auth-login.css}">
</head>
<body>
<div class="login-wrapper">
    <div class="login-container">
        <h2>Welcome Back</h2>

        <div th:if="${param.error}" class="alert alert-error">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            You have been logged out successfully.
        </div>
        <div th:if="${param.ottSent}" class="alert alert-success">
            A one-time magic link has been sent to your email.
        </div>

        <form th:action="@{/auth/login}" method="post" class="login-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username webauthn" required autofocus>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="password webauthn" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <div class="divider">
            <span>OR PASSWORDLESS</span>
        </div>

        <form th:action="@{/dummy}" method="post" class="login-form" id="passkey-login-form">
            <button type="submit" class="btn btn-primary">
                Login with PassKey
            </button>
        </form>

        <div class="divider"></div>

        <form th:action="@{/ott/generate}" method="post" class="login-form">
            <div class="input-group">
                <input type="text" id="ott-username" name="username" placeholder="Enter username for magic link" required>
            </div>
            <button type="submit" class="btn btn-secondary">Send Magic Link</button>
        </form>

        <div class="divider">
            <span>OR SOCIAL</span>
        </div>

        <div class="oauth2-group">
            <a th:href="@{/oauth2/authorization/github}" class="btn btn-social btn-github">
                Login with GitHub
            </a>
        </div>
    </div>
</div>
<script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
<script type="module" th:src="@{/js/auth-login.js}"></script>
</body>
</html>
